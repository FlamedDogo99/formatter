    --ce:         #ffffff;
    --bg:         #f7f4ef;
    --bg-1:       #edeae3;   /* one step darker — labels, headers */
    --bg-2:       #e1ddd5;   /* two steps — sunken / active */
    --fg:         #1c1917;
    --fg-2:       #1c1917;   /* muted text */
    --border:     #1c1917;
    --accent:     #d4590a;   /* one warm orange, used sparingly */
    --accent-bg:  #fdebd8;
}

@media (prefers-color-scheme: dark) {
    :root {
        --ce:         #5a513c;
        --bg:         #181613;
        --bg-1:       #242019;
        --bg-2:       #2e2a22;
        --fg:         #e8e3d8;
        --fg-2:       #8a8278;
        --border:     #3d3830;
        --accent:     #e8783a;
        --accent-bg:  #2a1a0d;
    }
}


/* ── Base ───────────────────────────────────────────────────────────────── */

body {
    background: var(--bg);
    color: var(--fg);
    font-size: 13px;
}


/* ── Toolbar ────────────────────────────────────────────────────────────── */

#toolbar {
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    gap: 6px;
}

.tb-sep {
    background: var(--border);
    opacity: 0.35;
}


/* ── Buttons ────────────────────────────────────────────────────────────── */

button {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 0;
    color: var(--fg);
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.02em;
    padding: 2px 7px;
}

button:hover {
    background: var(--bg-2);
}

button:active {
    background: var(--bg-2);
}

button:disabled {
    opacity: 0.4;
}

#export-btn {
    background: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent);
}

#export-btn:hover {
    background: var(--accent);
    color: var(--bg);
}


/* ── Editor ─────────────────────────────────────────────────────────────── */

#editor {
    background: var(--bg);
}


/* ── Component blocks ───────────────────────────────────────────────────── */

.component-block {
    background: var(--bg);
    border: 1px solid var(--border);
    margin-bottom: 10px;
}

.block-label {
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    color: var(--fg-2);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 8px;
}


/* ── Fields ─────────────────────────────────────────────────────────────── */

.field {
    border-bottom: 1px solid var(--border);
    border-color: color-mix(in srgb, var(--border) 40%, transparent);
}

.field-label {
    background: var(--bg-1);
    border-right: 1px solid color-mix(in srgb, var(--border) 40%, transparent);
    color: var(--fg-2);
    font-size: 11px;
}


/* ── Editables ──────────────────────────────────────────────────────────── */

[contenteditable] {
    background: var(--ce);
    border: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
    border-radius: 0;
    color: var(--fg);
    font-family: inherit;
    font-size: inherit;
}

[contenteditable]:focus {
    border-color: var(--accent);
    outline: none;
}


/* ── Body comp blocks ───────────────────────────────────────────────────── */

.comp-block {
    background: var(--bg);
    border: 1px solid var(--border);
}

.comp-header {
    background: var(--bg-1);
    border-bottom: 1px solid color-mix(in srgb, var(--border) 40%, transparent);
    color: var(--fg-2);
    font-family: inherit;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
}

/* Accent strip on the left edge — one color, used only on blocks that need scanning */
.comp-block[data-type="Section"] {
    border-left: 3px solid var(--accent);
}

.comp-block[data-type="Section"] > .comp-header {
    color: var(--accent);
}


/* ── Insert buttons ─────────────────────────────────────────────────────── */

.insert-btn {
    background: var(--bg-1);
    border: 1px solid color-mix(in srgb, var(--border) 60%, transparent);
    border-radius: 0;
    color: var(--fg-2);
    font-family: inherit;
    font-size: 11px;
}

.insert-btn:hover {
    background: var(--bg-2);
    border-color: var(--border);
    color: var(--fg);
}


/* ── Item rows ──────────────────────────────────────────────────────────── */

.item-row:hover,
.body-item-row:hover {
    background: var(--bg-1);
}


/* ── Table ──────────────────────────────────────────────────────────────── */

.table-toolbar {
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
}

.tbl-editor :is(th, td) {
    border: 1px solid color-mix(in srgb, var(--border) 50%, transparent);
    font-family: inherit;
    font-size: 12px;
}

.tbl-editor th {
    background: var(--bg-1);
    color: var(--fg-2);
    font-size: 10px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
}

.tbl-editor tbody tr:nth-child(even) td {
    background: var(--bg-1);
}

.tbl-editor tbody tr:hover td {
    background: var(--bg-2);
}


/* ── Status ─────────────────────────────────────────────────────────────── */

#status {
    color: var(--fg-2);
    font-size: 11px;
}
